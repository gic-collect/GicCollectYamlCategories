  - id: campus_facilities
    type: rating
    prompt: "How satisfied are you with campus facilities (libraries, labs, classrooms, etc.)?"
    required: true
    scale: 5
  - id: technology_resources
    type: rating
    prompt: "How adequate are the technology resources and support?"
    required: true
    scale: 5
  - id: student_support_services
