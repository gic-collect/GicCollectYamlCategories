description: A brief check-in for students to share their current mental well-being
  and identify areas for school support.
questions:
- options:
  - Excellent
  - Good
  - Fair
  - Poor
  - Very Poor
  text: How would you describe your current overall well-being?
  type: single
- options:
  - Happy
  - Stressed
  - Anxious
  - Sad
  - Hopeful
  - Overwhelmed
  - Calm
  text: Which of the following emotions have you experienced frequently recently?
    (select all that apply)
  type: multiple
- options:
  - Positively
  - Slightly positively
  - No effect
  - Slightly negatively
  - Significantly negatively
  text: How has your mental health affected your academic performance?
  type: single
- options:
  - Friends
  - Family
  - School counselor
  - Teachers
  - Online resources
  - No formal support
  text: What sources of support do you currently utilize? (select all that apply)
  type: multiple
- options:
  - Very comfortable
  - Somewhat comfortable
  - Neutral
  - Somewhat uncomfortable
  - Very uncomfortable
  text: If you needed mental health support, how comfortable would you be seeking
    help from school resources?
  type: single
- text: What is one thing that has been most helpful for your mental health recently?
  type: text
- text: What could the school do to better support student mental health?
  type: text
title: Student mental health check-in survey
