    prompt: "Do you feel adequately supported as a new employee after orientation?"
    required: true
    options: ["Yes, completely", "Mostly", "Somewhat", "Not yet", "No"]
  - id: program_duration
    type: single_choice
    prompt: "Was the orientation program duration appropriate?"
    required: true
    options: ["Too long", "Just right", "Too short", "Much too short", "Much too long"]
  - id: presenter_quality
    type: single_choice
    prompt: "How effective were the orientation presenters and facilitators?"
    required: true
    options: ["Very effective", "Effective", "Somewhat effective", "Ineffective", "Very ineffective"]
  - id: materials_quality
    type: single_choice
    prompt: "How would you rate the quality of orientation materials and resources?"
