description: Gathering insights to understand our users' roles, goals, and needs to
  build comprehensive user personas.
questions:
- options:
  - Student
  - Professional
  - Manager
  - Entrepreneur
  - Other
  text: What is your primary role or occupation?
  type: single
- options:
  - Improve efficiency
  - Learn new skills
  - Connect with others
  - Solve specific problems
  - Stay informed
  text: What is your primary motivation for engaging with digital tools or services
    in your field?
  type: single
- options:
  - Daily
  - Weekly
  - Monthly
  - Rarely
  - Never
  text: How often do you interact with digital tools or services related to your primary
    work/study?
  type: single
- options:
  - Lack of time
  - Complex software
  - Insufficient resources
  - Finding relevant information
  - Technical difficulties
  text: Which of the following challenges do you frequently encounter when trying
    to achieve your goals? (select all that apply)
  type: multiple
- options:
  - Ease of use
  - Robust functionality
  - Integrations
  - Strong customer support
  - Customization
  text: What features are most important to you in a digital product or service? (select
    all that apply)
  type: multiple
- text: What is one significant improvement or change that would help you achieve
    your goals more effectively?
  type: text
- text: Is there anything else you'd like to share about your needs, workflows, or
