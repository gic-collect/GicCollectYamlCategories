    type: multiple_choice
    prompt: "Which sessions or presentations did you find most valuable?"
    required: true
    options: ["Keynote Speech", "Panel Discussion", "Workshop A", "Networking Session", "Product Demo", "Breakout Sessions", "Exhibitor Hall"]
  - id: event_organization
    type: single_choice
    prompt: "How well organized and managed was the event?"
    required: true
    options: ["Excellent", "Good", "Average", "Poor", "Very poor"]
  - id: future_attendance_likelihood
    type: single_choice
    prompt: "How likely are you to attend a similar event in the future?"
    required: true
    options: ["Very likely", "Somewhat likely", "Neutral", "Not very likely", "Not at all likely"]
  - id: venue_quality
    type: rating
    prompt: "Rate the quality of the venue and facilities"
    required: true
    scale: 5
  - id: content_relevance
    type: single_choice
    prompt: "How relevant was the event content to your interests and needs?"
    required: true
    options: ["Very relevant", "Somewhat relevant", "Neutral", "Somewhat irrelevant", "Very irrelevant"]
  - id: networking_opportunities
    type: rating
    prompt: "Rate the quality of networking opportunities at the event"
    required: true
    scale: 5
  - id: speaker_quality
    type: single_choice
    prompt: "How would you rate the quality of the speakers and presentations?"
    required: true
    options: ["Excellent", "Good", "Average", "Poor", "Very poor"]
  - id: event_timing
    type: single_choice
    prompt: "Was the timing and duration of the event appropriate?"
    required: true
    options: ["Too long", "Just right", "Too short"]
  - id: registration_process
    type: single_choice
    prompt: "How was your experience with the registration process?"
    required: true
    options: ["Very smooth", "Somewhat smooth", "Neutral", "Somewhat difficult", "Very difficult"]
