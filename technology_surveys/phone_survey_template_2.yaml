title: "Phone Survey"
description: "A comprehensive survey to gather insights on phone usage and satisfaction with current mobile technology"
category: "Technology Surveys"
questions:
  - id: smartphone_satisfaction
    type: rating
    prompt: "How satisfied are you with your current smartphone experience?"
    required: true
    scale: 5
  - id: upgrade_frequency
    type: single_choice
    prompt: "How often do you upgrade your smartphone?"
    required: true
    options: ["Annually", "Every 2-3 years", "Every 4+ years", "Only when broken", "Never"]
  - id: purchase_factors
    type: multiple_choice
    prompt: "Which factors are most important when choosing a new smartphone? (select all that apply)"
    required: true
    options: ["Battery life", "Camera quality", "Price", "Brand", "Screen size", "Performance", "Operating system"]
  - id: primary_use
    type: single_choice
    prompt: "What is your primary use for your smartphone?"
    required: true
    options: ["Communication", "Social media", "Web browsing", "Gaming", "Work/Productivity", "Entertainment"]
  - id: daily_usage_hours
    type: single_choice
    prompt: "Approximately how many hours per day do you use your smartphone?"
    required: true
    options: ["Less than 1 hour", "1-2 hours", "2-4 hours", "4-6 hours", "More than 6 hours"]
  - id: current_brand
    type: single_choice
    prompt: "What brand is your current smartphone?"
    required: true
    options: ["Apple", "Samsung", "Google", "OnePlus", "Huawei", "Xiaomi", "Other"]
  - id: operating_system
    type: single_choice
    prompt: "What operating system does your smartphone use?"
    required: true
    options: ["iOS", "Android", "Other"]
  - id: battery_life_satisfaction
    type: rating
    prompt: "Rate your satisfaction with battery life"
    required: true
    scale: 5
  - id: camera_quality_rating
    type: rating
    prompt: "Rate the camera quality of your smartphone"
    required: true
    scale: 5
  - id: performance_speed
    type: single_choice
    prompt: "How would you rate the performance and speed of your smartphone?"
    required: true
    options: ["Excellent", "Good", "Average", "Poor", "Very poor"]
  - id: screen_quality
    type: rating
    prompt: "Rate the display/screen quality"
    required: true
    scale: 5
  - id: storage_capacity
    type: single_choice
    prompt: "Is your current storage capacity sufficient?"
    required: true
    options: ["More than enough", "Sufficient", "Barely sufficient", "Insufficient", "Very insufficient"]
  - id: app_ecosystem
    type: rating
    prompt: "Rate the quality and availability of apps for your platform"
    required: true
    scale: 5
  - id: mobile_network_satisfaction
    type: single_choice
    prompt: "How satisfied are you with your mobile network/carrier service?"
    required: true
    options: ["Very satisfied", "Satisfied", "Neutral", "Dissatisfied", "Very dissatisfied"]
  - id: data_plan_sufficiency
    type: rating
    prompt: "Rate whether your data plan meets your needs"
    required: true
    scale: 5
  - id: security_features
    type: single_choice
    prompt: "How important are security features (biometrics, encryption, etc.) to you?"
    required: true
    options: ["Very important", "Important", "Somewhat important", "Not very important", "Not important"]
  - id: future_purchase_intent
    type: single_choice
    prompt: "What type of device are you most likely to purchase next?"
    required: true
    options: ["Flagship smartphone", "Mid-range smartphone", "Budget smartphone", "Foldable phone", "Tablet", "Not sure"]
  - id: improvement_suggestions
    type: long_text
    prompt: "What would you improve about your current smartphone or mobile service?"
    required: false
  - id: feature_wishlist
    type: text
    prompt: "What new features would you like to see in future smartphones?"
    required: false
  - id: overall_recommendation
    type: rating
    prompt: "How likely are you to recommend your current smartphone to others?"
    required: true
    scale: 10
  - id: additional_feedback
    type: long_text
    prompt: "Do you have any additional comments or feedback about mobile technology?"
    required: false
