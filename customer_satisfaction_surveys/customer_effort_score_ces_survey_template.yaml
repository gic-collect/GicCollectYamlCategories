description: A survey to measure the effort customers expend when interacting with
  our service and achieve their goals.
questions:
- options:
  - Strongly disagree
  - Disagree
  - Neutral
  - Agree
  - Strongly agree
  text: 'To what extent do you agree or disagree with the following statement: ''Our
    service made it easy for me to handle my issue/complete my task.'''
  type: single
- options:
  - Very low effort
  - Low effort
  - Moderate effort
  - High effort
  - Very high effort
  text: How much effort did you personally have to put forth to handle your request?
  type: single
- options:
  - true
  - false
  - Partially
  text: Was your issue resolved or task completed?
  type: single
- options:
  - Unclear instructions
  - Long wait times
