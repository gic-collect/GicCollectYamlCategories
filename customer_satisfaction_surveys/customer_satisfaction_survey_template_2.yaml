  type: single_choice
  prompt: How satisfied are you with our communication and updates?
  required: true
  options:
  - Very satisfied
  - Somewhat satisfied
  - Neutral
  - Somewhat dissatisfied
  - Very dissatisfied
- id: onboarding_experience
  type: single_choice
  prompt: How would you rate your onboarding experience?
  required: false
  options:
  - Excellent
  - Good
  - Fair
  - Poor
  - Did not use onboarding
- id: feature_utilization
  type: multiple_choice
