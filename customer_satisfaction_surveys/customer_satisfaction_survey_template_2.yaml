title: Customer Satisfaction Survey
description: Help us improve by sharing your comprehensive feedback on our product or service and your overall satisfaction.
category: Customer Satisfaction
questions:
- id: overall_satisfaction
  type: single_choice
  prompt: Overall, how satisfied are you with our product or service?
  required: true
  options:
  - Very satisfied
  - Somewhat satisfied
  - Neutral
  - Somewhat dissatisfied
  - Very dissatisfied
- id: support_quality_rating
  type: single_choice
  prompt: How would you rate the quality of our customer support?
  required: true
  options:
  - Excellent
  - Good
  - Fair
  - Poor
  - Not applicable
- id: important_features
  type: multiple_choice
  prompt: Which of the following features are most important to you? (Select all that apply)
  required: false
  options:
  - Ease of use
  - Performance
  - Reliability
  - Feature set
  - Integrations
  - Price
  - Customer support
  - Documentation
- id: expectations_met
  type: single_choice
  prompt: Did our product or service meet your expectations?
  required: true
  options:
  - Exceeded expectations
  - Met expectations
  - Partially met
  - Did not meet
- id: satisfaction_trend
  type: single_choice
  prompt: Compared to your initial experience, how has your satisfaction changed?
  required: false
  options:
  - Much more satisfied now
  - Somewhat more satisfied
  - About the same
  - Somewhat less satisfied
  - Much less satisfied
- id: product_usability
  type: rating
