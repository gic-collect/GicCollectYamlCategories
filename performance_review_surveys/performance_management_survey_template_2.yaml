  - id: goal_alignment
    type: single_choice
    prompt: "How well do your individual goals align with team and organizational objectives?"
    required: true
    options: ["Very well", "Well", "Moderately", "Poorly", "Very poorly"]
  - id: progress_tracking
    type: rating
    prompt: "How effective is the system for tracking progress toward goals?"
    required: true
    scale: 5
  - id: development_resources
    type: single_choice
    prompt: "Are adequate resources provided for professional development?"
    required: true
    options: ["More than adequate", "Adequate", "Somewhat adequate", "Inadequate", "Very inadequate"]
  - id: recognition_frequency
    type: single_choice
    prompt: "How often do you receive recognition for your achievements?"
    required: true
    options: ["Very frequently", "Frequently", "Occasionally", "Rarely", "Never"]
  - id: performance_data_accuracy
    type: rating
    prompt: "Rate the accuracy and fairness of performance data used in evaluations"
    required: true
