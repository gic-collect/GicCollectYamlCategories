  - id: continuous_feedback
    type: single_choice
    prompt: "How effective is the continuous feedback process throughout the year?"
    required: true
    options: ["Very effective", "Effective", "Neutral", "Ineffective", "Very ineffective"]
  - id: manager_coaching
    type: rating
    prompt: "Rate the quality of coaching and guidance from your manager"
    required: true
