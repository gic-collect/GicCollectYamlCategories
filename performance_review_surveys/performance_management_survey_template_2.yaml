    prompt: "Which of the following best describes the clarity of performance goals and expectations?"
    required: true
    options: ["Very clear", "Mostly clear", "Moderately clear", "Somewhat unclear", "Very unclear"]
  - id: effective_aspects
    type: multiple_choice
    prompt: "What aspects of the performance review process do you find most effective? (select all that apply)"
    required: true
    options: ["Goal setting", "Feedback delivery", "Development planning", "Recognition of achievements", "Two-way discussion", "Documentation"]
  - id: growth_contribution
    type: single_choice
    prompt: "Do you feel the performance management process contributes to your professional growth and development?"
    required: true
    options: ["Strongly agree", "Agree", "Neutral", "Disagree", "Strongly disagree"]
  - id: tools_effectiveness
    type: rating
    prompt: "Rate the effectiveness of the performance management tools and systems"
    required: true
